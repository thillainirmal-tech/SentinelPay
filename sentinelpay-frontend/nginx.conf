server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    # ── React SPA ────────────────────────────────────────────────────────────
    # All routes that are not real files fall back to index.html so that
    # client-side navigation (React Router) works correctly after a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    # The React bundle is built with REACT_APP_API_BASE_URL=http://localhost:3001,
    # so every API call lands here as /api/...
    #
    # Nginx forwards it to the API Gateway over the internal Docker network.
    # The browser never sees the fraud-api-gateway hostname — from its perspective
    # every request is same-origin (localhost:3001), so no CORS preflight fires.
    location /api/ {
        proxy_pass         http://fraud-api-gateway:8085;
        proxy_http_version 1.1;

        # Preserve the original host header so Spring's request matching works
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow long-running fraud-result polling requests (up to 60 s)
        proxy_read_timeout 60s;
    }

    # ── Auth reverse proxy ───────────────────────────────────────────────────
    # authApi.js calls /auth/login, /auth/register, /auth/health (no /api/ prefix).
    # axiosConfig.js calls /auth/refresh (also no /api/ prefix).
    # The gateway routes Path=/auth/** → auth-service, so these paths are correct
    # for the gateway. Nginx must proxy them instead of falling back to index.html.
    location /auth/ {
        proxy_pass         http://fraud-api-gateway:8085;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
    }

    # ── Bank reverse proxy ───────────────────────────────────────────────────
    # bankApi.js calls /bank/balance and /bank/account/by-upi/{upiId}.
    # The gateway routes Path=/bank/balance → bank-service.
    location /bank/ {
        proxy_pass         http://fraud-api-gateway:8085;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
    }
}
